<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Donations API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .donation-item {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }
        .donor-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4e73df, #6f42c1);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 12px;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">Donations API Test</h1>
        
        <div class="card">
            <div class="card-header">
                <h5>API Response</h5>
            </div>
            <div class="card-body">
                <button class="btn btn-primary mb-3" onclick="loadDonations()">
                    <i class="fas fa-sync-alt me-2"></i>Load Donations
                </button>
                <button class="btn btn-info mb-3 ms-2" onclick="loadDonationsForCampaign(5)">
                    Campaign #5 Only
                </button>
                <button class="btn btn-info mb-3 ms-2" onclick="loadDonationsForCampaign(7)">
                    Campaign #7 Only
                </button>
                
                <pre id="jsonResponse" style="background: rgba(30, 41, 59, 0.95); color: #f1f5f9; border: 1px solid #334155;" class="p-3 rounded">Click "Load Donations" to test...</pre>
            </div>
        </div>
        
        <div class="card mt-4">
            <div class="card-header">
                <h5>Live Feed Preview</h5>
            </div>
            <div class="card-body">
                <div id="donationFeed" class="donation-feed">
                    <p style="color: #f1f5f9;">Load donations to see them here...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = '/micro-donation-portal/backend/api';
        
        async function loadDonations() {
            try {
                const response = await fetch(`${API_BASE_URL}/donations/get-recent.php?limit=8`);
                const data = await response.json();
                
                document.getElementById('jsonResponse').textContent = JSON.stringify(data, null, 2);
                
                displayDonations(data.donations);
            } catch (error) {
                document.getElementById('jsonResponse').textContent = 'Error: ' + error.message;
            }
        }
        
        async function loadDonationsForCampaign(campaignId) {
            try {
                const response = await fetch(`${API_BASE_URL}/donations/get-recent.php?limit=8&campaign_id=${campaignId}`);
                const data = await response.json();
                
                document.getElementById('jsonResponse').textContent = JSON.stringify(data, null, 2);
                
                displayDonations(data.donations);
            } catch (error) {
                document.getElementById('jsonResponse').textContent = 'Error: ' + error.message;
            }
        }
        
        function displayDonations(donations) {
            const feed = document.getElementById('donationFeed');
            
            if (!donations || donations.length === 0) {
                feed.innerHTML = '<p style="color: #f1f5f9;">No donations found.</p>';
                return;
            }
            
            feed.innerHTML = '';
            
            donations.forEach(donation => {
                const item = document.createElement('div');
                item.className = 'donation-item d-flex align-items-center';
                item.innerHTML = `
                    <div class="donor-avatar">${donation.initial}</div>
                    <div class="flex-grow-1">
                        <div class="fw-bold">${donation.donor_name}</div>
                        <div class="text-success">RM ${donation.amount.toFixed(2)}</div>
                        <small style="color: #f1f5f9;">${donation.time_ago} • ${donation.campaign_title}</small>
                    </div>
                `;
                feed.appendChild(item);
            });
        }
        
        // Auto-load on page load
        document.addEventListener('DOMContentLoaded', loadDonations);
    </script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
</body>
</html>

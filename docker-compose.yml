services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: micro-donation-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: micro_donation_db
      MYSQL_USER: microdonation_user
      MYSQL_PASSWORD: microdonation_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - micro-donation-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  # phpMyAdmin (Database Management UI)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: micro-donation-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: rootpassword
      UPLOAD_LIMIT: 100M
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - micro-donation-network

  # Apache + PHP Server
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: micro-donation-web
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      APP_ENV: development
      DB_HOST: db
      DB_NAME: micro_donation_db
      DB_USER: microdonation_user
      DB_PASS: microdonation_password
    volumes:
      # Mount entire project directory
      - ./:/var/www/html:cached
      # Ensure uploads directory is writable
      - ./uploads:/var/www/html/uploads
      - ./assets/images:/var/www/html/assets/images
      # Apache config
      - ./docker/apache/sites/000-default.conf:/etc/apache2/sites-available/000-default.conf:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - micro-donation-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  db_data:
    driver: local

networks:
  micro-donation-network:
    driver: bridge
